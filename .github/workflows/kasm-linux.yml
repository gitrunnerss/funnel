name: Linux XFCE Desktop + KasmVNC + Tunnel

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'Panel ID'
        required: true
        default: 'manual'
      sure_dakika:
        description: 'Dakika (max 350)'
        required: true
        default: '60'
      vnc_sifre:
        description: 'VNC sifresi'
        required: true
        default: 'kasm_password_123'
      tunnel_provider:
        description: 'cloudflare | tailscale | ngrok'
        required: true
        default: 'cloudflare'

run-name: "linux-xfce · ${{ inputs.correlation_id }} · ${{ inputs.sure_dakika }} dk"

jobs:
  desktop:
    runs-on: ubuntu-22.04
    timeout-minutes: 355
    env:
      BACKEND_URL: ${{ secrets.BACKEND_URL }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      VNC_SIFRE: ${{ inputs.vnc_sifre }}
      SURE_DK: ${{ inputs.sure_dakika }}
      CID: ${{ inputs.correlation_id }}
    steps:
      - name: 1-XFCE4+Xorg+dbus
        run: |
          set -e
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            xorg xfce4 xfce4-terminal xfce4-power-manager \
            dbus-x11 policykit-1 sudo wget curl ca-certificates \
            xterm dbus fonts-dejavu
          echo "XFCE OK"
          which startxfce4 || echo "WARN: startxfce4 yok"

      - name: 2-KasmVNC-kur
        run: |
          set -e
          wget -q "https://github.com/kasmtech/KasmVNC/releases/download/v1.4.0/kasmvncserver_jammy_1.4.0_amd64.deb" -O /tmp/kasmvnc.deb
          sudo apt-get install -y /tmp/kasmvnc.deb
          sudo adduser $USER ssl-cert
          which vncserver && echo "vncserver OK" || echo "vncserver YOK"
          which vncpasswd && echo "vncpasswd OK" || echo "vncpasswd YOK"

      - name: 3-KasmVNC-ayar
        run: |
          mkdir -p ~/.vnc
          echo "$VNC_SIFRE" | vncpasswd -f > ~/.vnc/passwd 2>/dev/null || true
          if [ ! -s ~/.vnc/passwd ]; then
            printf '%s\n%s\nn\n' "$VNC_SIFRE" "$VNC_SIFRE" | vncpasswd > ~/.vnc/passwd 2>/dev/null || true
          fi
          chmod 600 ~/.vnc/passwd
          ls -la ~/.vnc/passwd
          cat > ~/.vnc/kasmvnc.yaml << 'YAML'
network:
  protocol: http
  websocket_port: 8444
  interface: 0.0.0.0
security:
  basic_auth: false
X509:
  enabled: false
YAML
          cat > ~/.vnc/xstartup << 'XST'
#!/bin/bash
unset SESSION_MANAGER
unset DBUS_SESSION_BUS_ADDRESS
export XDG_SESSION_DESKTOP=xfce
export XDG_DATA_DIRS=/usr/share/xfce4:/usr/share/xubuntu:/usr/share:/usr/local/share
export DISPLAY=:1
exec startxfce4
XST
          chmod +x ~/.vnc/xstartup
          echo "ayarlar hazir"

      - name: 4-KasmVNC-baslat
        run: |
          vncserver :1 -geometry 1280x720 -depth 24 \
            -websocketPort 8444 -disableBasicAuth \
            2>&1 | tee /tmp/vnc.log &
          sleep 10
          cat /tmp/vnc.log || true
          curl -sS http://localhost:8444/ -o /dev/null -w "HTTP %{http_code}\n" || echo "port bekleniyor"
          ps aux | grep vnc | grep -v grep || echo "vnc proses yok"

      - name: 5-filebrowser
        run: |
          mkdir -p shared
          curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash
          filebrowser -a 0.0.0.0 -p 6902 -r "$PWD/shared" \
            --username admin --password "$VNC_SIFRE" \
            > filebrowser.log 2>&1 &
          echo $! > fb.pid

      - name: 6-cloudflare-tunnel
        id: tunnel
        run: |
          set -e
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared && sudo mv cloudflared /usr/local/bin/
          cloudflared --version
          start_cf () {
            cloudflared tunnel --no-tls-verify --url "$1" > "$2" 2>&1 &
            echo $! >> tunnels.pid
            local U=""
            for i in $(seq 1 40); do
              U=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' "$2" | head -1)
              [ -n "$U" ] && break; sleep 1
            done
            echo "$U"
          }
          VNC_URL=$(start_cf http://localhost:8444 vnc_tunnel.log)
          FILES_URL=$(start_cf http://localhost:6902 files_tunnel.log)
          if [ -z "$VNC_URL" ]; then
            echo "::error::Tunnel URL yok"; cat vnc_tunnel.log; exit 1
          fi
          echo "vnc_url=$VNC_URL" >> "$GITHUB_OUTPUT"
          echo "files_url=$FILES_URL" >> "$GITHUB_OUTPUT"
          {
            echo "## Linux XFCE Desktop Hazir"
            echo "| VNC | $VNC_URL |"
            echo "| Dosyalar | $FILES_URL |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 7-webhook
        if: env.BACKEND_URL != ''
        run: |
          curl -sS -X POST "$BACKEND_URL/webhook/tunnel" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: $WEBHOOK_SECRET" \
            -d '{"correlation_id":"'$CID'","os":"linux","status":"ready","vnc_url":"'${{ steps.tunnel.outputs.vnc_url }}'","files_url":"'${{ steps.tunnel.outputs.files_url }}'","user":"runner"}' \
            || echo "webhook basarisiz"

      - name: 8-aktif-tut
        run: |
          DURATION=$(( $SURE_DK * 60 ))
          echo "$DURATION sn aktif"
          sleep $DURATION

      - name: 9-artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-${{ inputs.correlation_id }}
          path: shared/
          if-no-files-found: ignore

      - name: 10-temizlik
        if: always()
        run: |
          vncserver -kill :1 2>/dev/null || true
          [ -f fb.pid ] && kill $(cat fb.pid) 2>/dev/null || true
          [ -f tunnels.pid ] && xargs -r kill < tunnels.pid 2>/dev/null || true
          if [ -n "$BACKEND_URL" ]; then
            curl -sS -X POST "$BACKEND_URL/webhook/tunnel" \
              -H "Content-Type: application/json" -H "X-Webhook-Token: $WEBHOOK_SECRET" \
              -d '{"correlation_id":"'$CID'","status":"stopped"}' || true
