name: Linux XFCE Desktop + KasmVNC + Tunnel

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'Panelin urettigi benzersiz id (run eslestirme)'
        required: true
        default: 'manual'
      sure_dakika:
        description: 'Kac dakika ayakta kalsin (max 350)'
        required: true
        default: '60'
      vnc_sifre:
        description: 'KasmVNC giris sifresi'
        required: true
        default: 'kasm_password_123'
      desktop:
        description: 'xfce4 veya gnome (xfce4 onerilir, hafif)'
        required: true
        default: 'xfce4'
      tunnel_provider:
        description: 'cloudflare | tailscale | ngrok | pinggy'
        required: true
        default: 'cloudflare'

run-name: "linux-desktop · ${{ inputs.correlation_id }} · ${{ inputs.sure_dakika }}dk"

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      BACKEND_URL: ${{ secrets.BACKEND_URL }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
    steps:
      - name: Sistem hazirligi (XFCE + Xorg + dbus)
        run: |
          set -e
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            xorg xfce4 xfce4-terminal xfce4-power-manager \
            dbus-x11 policykit-1 sudo wget curl ca-certificates \
            xterm dbus fonts-dejavu
          echo "XFCE + Xorg kuruldu."

      - name: KasmVNC kurulumu (v1.4.0 Ubuntu Jammy)
        run: |
          set -e
          KASMVNC_DEB="https://github.com/kasmtech/KasmVNC/releases/download/v1.4.0/kasmvncserver_jammy_1.4.0_amd64.deb"
          wget -q "$KASMVNC_DEB" -O /tmp/kasmvnc.deb
          sudo apt-get install -y /tmp/kasmvnc.deb
          sudo adduser $USER ssl-cert
          echo "KasmVNC kuruldu."

      - name: KasmVNC ayarlari (sifre + port + http + basicAuth kapali)
        run: |
          mkdir -p ~/.vnc
          # Sifreyi ayarla
          echo "${{ inputs.vnc_sifre }}" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          # kasmvnc.yaml: websocket port 8444, http, basicAuth kapali
          cat > ~/.vnc/kasmvnc.yaml << 'YAML'
          network:
            protocol: http
            websocket_port: 8444
            interface: 0.0.0.0
          security:
            basic_auth: false
          X509:
            enabled: false
          YAML
          # xstartup script (XFCE)
          cat > ~/.vnc/xstartup << 'XST'
          #!/bin/bash
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          export XDG_SESSION_DESKTOP=xfce
          export XDG_DATA_DIRS=/usr/share/xfce4:/usr/share/xubuntu:/usr/share:/usr/local/share
          exec startxfce4
          XST
          chmod +x ~/.vnc/xstartup

      - name: KasmVNC server'i baslat
        run: |
          set -e
          vncserver :1 -geometry 1280x720 -depth 24 -websocketPort 8444 \
            -disableBasicAuth -httpInterface 0.0.0.0 \
            2>&1 | tee /tmp/vnc.log &
          sleep 5
          cat /tmp/vnc.log
          # Port erisilebilir mi kontrol
          curl -sS http://localhost:8444/ -o /dev/null -w "KasmVNC HTTP: %{http_code}\n" || echo "port hazir degil ama devam"

      - name: Dosya yoneticisi (filebrowser) baslat
        run: |
          mkdir -p shared
          curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash
          filebrowser -a 0.0.0.0 -p 6902 -r "$PWD/shared" \
            --username admin --password '${{ inputs.vnc_sifre }}' \
            > filebrowser.log 2>&1 &
          echo $! > fb.pid
          echo "filebrowser 6902'de calisiyor"

      - name: Cloudflare tunnel kur ve baslat
        id: tunnel
        run: |
          set -e
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared && sudo mv cloudflared /usr/local/bin/

          start_cf () {
            cloudflared tunnel --no-tls-verify --url "$1" > "$2" 2>&1 &
            echo $! >> tunnels.pid
            local U=""
            for i in $(seq 1 30); do
              U=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' "$2" | head -1)
              [ -n "$U" ] && break;
              sleep 1
            done
            echo "$U"
          }

          case "${{ inputs.tunnel_provider }}" in
            cloudflare|*)
              VNC_URL=$(start_cf http://localhost:8444 vnc.log)
              FILES_URL=$(start_cf http://localhost:6902 files.log)
              ;;
          esac

          if [ -z "$VNC_URL" ]; then
            echo "::error::Tunnel URL alinamadi"; cat vnc.log; exit 1
          fi
          echo "vnc_url=$VNC_URL" >> "$GITHUB_OUTPUT"
          echo "files_url=$FILES_URL" >> "$GITHUB_OUTPUT"

          {
            echo "## 🖥️ Linux XFCE Desktop Hazir"
            echo ""
            echo "| Alan | Deger |"
            echo "|---|---|"
            echo "| VNC URL | $VNC_URL |"
            echo "| Dosyalar | $FILES_URL |"
            echo "| Kullanici | runner |"
            echo "| Sifre | \`${{ inputs.vnc_sifre }}\` |"
            echo "| Desktop | XFCE4 |"
            echo "| KasmVNC | v1.4.0 |"
            echo "| Sure | ${{ inputs.sure_dakika }} dakika |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: URL'leri backend'e bildir (webhook)
        if: env.BACKEND_URL != ''
        run: |
          curl -sS -X POST "$BACKEND_URL/webhook/tunnel" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: $WEBHOOK_SECRET" \
            -d "{\"correlation_id\":\"${{ inputs.correlation_id }}\",\"os\":\"linux\",\"status\":\"ready\",\"vnc_url\":\"${{ steps.tunnel.outputs.vnc_url }}\",\"files_url\":\"${{ steps.tunnel.outputs.files_url }}\",\"user\":\"runner\"}" \
            || echo "webhook gonderilemedi (backend kapali olabilir)"

      - name: Belirtilen sure boyunca aktif tut
        run: |
          DURATION=$(( ${{ inputs.sure_dakika }} * 60 ))
          echo "$DURATION saniye aktif kalinacak..."
          sleep $DURATION

      - name: Cikti dosyalarini artifact olarak yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-${{ inputs.correlation_id }}
          path: shared/
          if-no-files-found: ignore

      - name: Temizlik
        if: always()
        run: |
          vncserver -kill :1 2>/dev/null || true
          [ -f fb.pid ] && kill $(cat fb.pid) 2>/dev/null || true
          [ -f tunnels.pid ] && xargs -r kill < tunnels.pid 2>/dev/null || true
          if [ -n "$BACKEND_URL" ]; then
            curl -sS -X POST "$BACKEND_URL/webhook/tunnel" \
              -H "Content-Type: application/json" -H "X-Webhook-Token: $WEBHOOK_SECRET" \
              -d "{\"correlation_id\":\"${{ inputs.correlation_id }}\",\"status\":\"stopped\"}" || true
          fi
