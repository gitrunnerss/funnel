# retrigger
name: Linux XFCE Desktop + KasmVNC + Tunnel

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'Panel ID'
        required: true
        default: 'manual'
      sure_dakika:
        description: 'Dakika (max 350)'
        required: true
        default: '60'
      vnc_sifre:
        description: 'VNC sifresi'
        required: true
        default: 'kasm_password_123'
      tunnel_provider:
        description: 'cloudflare | tailscale | ngrok'
        required: true
        default: 'cloudflare'

run-name: "linux-xfce · ${{ inputs.correlation_id }} · ${{ inputs.sure_dakika }} dk"

jobs:
  desktop:
    runs-on: ubuntu-22.04
    timeout-minutes: 355
    env:
      BACKEND_URL: ${{ secrets.BACKEND_URL }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      VNC_SIFRE: ${{ inputs.vnc_sifre }}
      SURE_DK: ${{ inputs.sure_dakika }}
      CID: ${{ inputs.correlation_id }}
    steps:
      - name: 1-XFCE4-kur
        run: |
          set -e
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends xorg xfce4 xfce4-terminal xfce4-power-manager dbus-x11 policykit-1 sudo wget curl ca-certificates xterm dbus fonts-dejavu
          which startxfce4 || echo "WARN: startxfce4 yok"
      - name: 2-KasmVNC-kur
        run: |
          set -e
          wget -q "https://github.com/kasmtech/KasmVNC/releases/download/v1.4.0/kasmvncserver_jammy_1.4.0_amd64.deb" -O /tmp/kasmvnc.deb
          sudo apt-get install -y /tmp/kasmvnc.deb
          sudo adduser $USER ssl-cert
          which vncserver && echo "vncserver OK"
          which vncpasswd && echo "vncpasswd OK"
      - name: 3-KasmVNC-ayar
        run: |
          mkdir -p ~/.vnc
          # KasmVNC vncpasswd: sifreyi ve yazma iznini ayarla
          printf '%s\n%s\n' "$VNC_SIFRE" "$VNC_SIFRE" | vncpasswd -u "$USER" -w || true
          # Kontrol
          ls -la ~/.vnc/passwd 2>/dev/null || echo "passwd dosyasi yok"
          # kasmvnc.yaml
          printf 'network:\n  protocol: http\n  websocket_port: 8444\n  interface: 0.0.0.0\nsecurity:\n  basic_auth: false\nX509:\n  enabled: false\n' > ~/.vnc/kasmvnc.yaml
          cat ~/.vnc/kasmvnc.yaml
          # xstartup (XFCE)
          printf '#!/bin/bash\nunset SESSION_MANAGER\nunset DBUS_SESSION_BUS_ADDRESS\nexport XDG_SESSION_DESKTOP=xfce\nexport XDG_DATA_DIRS=/usr/share/xfce4:/usr/share/xubuntu:/usr/share:/usr/local/share\nexport DISPLAY=":1"\nexec startxfce4\n' > ~/.vnc/xstartup
          chmod +x ~/.vnc/xstartup
          cat ~/.vnc/xstartup
          echo "ayarlar hazir"
      - name: 4-KasmVNC-baslat
        run: |
          # xauth hazirla
          touch ~/.Xauthority 2>/dev/null || true
          # vncserver'i baslat — interaktif prompt'u otomatik cevapla
          printf '1\n' | vncserver :1 -geometry 1280x720 -depth 24 -websocketPort 8444 -disableBasicAuth -select-de xfce4 2>&1 | tee /tmp/vnc.log &
          sleep 12
          cat /tmp/vnc.log || true
          curl -sS http://localhost:8444/ -o /dev/null -w "HTTP %{http_code}\n" || echo "port bekleniyor"
          ps aux | grep vnc | grep -v grep || echo "vnc proses yok"
      - name: 5-filebrowser
        run: |
          mkdir -p shared
          curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash
          filebrowser -a 0.0.0.0 -p 6902 -r "$PWD/shared" --username admin --password "$VNC_SIFRE" > filebrowser.log 2>&1 &
          echo $! > fb.pid
      - name: 6-cloudflare-tunnel
        id: tunnel
        run: |
          set -e
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared && sudo mv cloudflared /usr/local/bin/
          cloudflared --version
          cloudflared tunnel --no-tls-verify --url http://localhost:8444 > vnc_tunnel.log 2>&1 &
          echo $! >> tunnels.pid
          cloudflared tunnel --no-tls-verify --url http://localhost:6902 > files_tunnel.log 2>&1 &
          echo $! >> tunnels.pid
          VNC_URL=""
          for i in $(seq 1 40); do
            VNC_URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' vnc_tunnel.log | head -1)
            [ -n "$VNC_URL" ] && break; sleep 1
          done
          FILES_URL=""
          for i in $(seq 1 40); do
            FILES_URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' files_tunnel.log | head -1)
            [ -n "$FILES_URL" ] && break; sleep 1
          done
          if [ -z "$VNC_URL" ]; then
            echo "::error::Tunnel URL yok"; cat vnc_tunnel.log; exit 1
          fi
          echo "vnc_url=$VNC_URL" >> "$GITHUB_OUTPUT"
          echo "files_url=$FILES_URL" >> "$GITHUB_OUTPUT"
          echo "## Linux XFCE Desktop" >> "$GITHUB_STEP_SUMMARY"
          echo "| VNC | $VNC_URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dosyalar | $FILES_URL |" >> "$GITHUB_STEP_SUMMARY"
      - name: 7-webhook
        if: env.BACKEND_URL != ''
        run: |
          VNC_OUT="${{ steps.tunnel.outputs.vnc_url }}"
          FILES_OUT="${{ steps.tunnel.outputs.files_url }}"
          curl -sS -X POST "$BACKEND_URL/webhook/tunnel" -H "Content-Type: application/json" -H "X-Webhook-Token: $WEBHOOK_SECRET" -d '{"correlation_id":"'$CID'","os":"linux","status":"ready","vnc_url":"'$VNC_OUT'","files_url":"'$FILES_OUT'","user":"runner"}' || echo "webhook basarisiz"
      - name: 8-aktif-tut
        run: |
          DURATION=$(( $SURE_DK * 60 ))
          echo "$DURATION sn aktif"
          sleep $DURATION
      - name: 9-artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-${{ inputs.correlation_id }}
          path: shared/
          if-no-files-found: ignore
      - name: 10-temizlik
        if: always()
        run: |
          vncserver -kill :1 2>/dev/null || true
          [ -f fb.pid ] && kill $(cat fb.pid) 2>/dev/null || true
          [ -f tunnels.pid ] && xargs -r kill < tunnels.pid 2>/dev/null || true
          if [ -n "$BACKEND_URL" ]; then
            curl -sS -X POST "$BACKEND_URL/webhook/tunnel" -H "Content-Type: application/json" -H "X-Webhook-Token: $WEBHOOK_SECRET" -d '{"correlation_id":"'$CID'","status":"stopped"}' || true
cd /workspaces/funnel
